name: Build Magisk

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  submodules: recursive

            - name: Setup environment
              uses: ./.github/actions/setup
              with:
                  is-asset-build: true

            - name: Build Magisk
              run: python build.py -vr all

            - name: Stop gradle daemon
              run: ./app/gradlew --stop
              
            - name: Upload Magisk output
              uses: actions/upload-artifact@v4
              with:
                  name: magisk_output
                  path: out
                  compression-level: 9
              
            - name: Upload native builds
              uses: actions/upload-artifact@v4
              with:
                  name: native_build
                  path: |
                      native/out/arm64-v8a
                      native/out/armeabi-v7a
                      native/out/x86
                      native/out/x86_64
                  compression-level: 9