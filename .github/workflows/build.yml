name: Build Magisk

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            # 1️⃣ Checkout
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  submodules: recursive
                  fetch-depth: 1

            # 2️⃣ Setup environment
            - name: Setup environment
              uses: ./.github/actions/setup
              with:
                  is-asset-build: true

            # 3️⃣ Cache gradle
            - name: Cache gradle
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.gradle/caches
                      ~/.gradle/wrapper
                  key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
                  restore-keys: |
                      gradle-${{ runner.os }}-

            # 4️⃣ Cache pip
            - name: Cache pip
              uses: actions/cache@v4
              with:
                  path: ~/.cache/pip
                  key: pip-${{ runner.os }}-${{ hashFiles('**/requirements.txt') }}
                  restore-keys: |
                      pip-${{ runner.os }}-

            # 5️⃣ Install ccache
            - name: Install ccache
              run: sudo apt-get install -y ccache

            # 6️⃣ Cache ccache
            - name: Cache ccache
              uses: actions/cache@v4
              with:
                  path: ~/.ccache
                  key: ccache-${{ runner.os }}-${{ github.sha }}
                  restore-keys: |
                      ccache-${{ runner.os }}-

            - name: Setup ccache env
              run: |
                  echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV
                  echo "CCACHE_MAXSIZE=2G" >> $GITHUB_ENV

            # 9️⃣ Build Magisk (full build)
            - name: Build Magisk
              run: python build.py -vr all

            # 🔟 Stop Gradle daemon
            - name: Stop gradle daemon
              run: ./app/gradlew --stop

            # 1️⃣1️⃣ Upload Magisk output
            - name: Upload Magisk output
              uses: actions/upload-artifact@v4
              with:
                  name: magisk_output
                  path: out
                  compression-level: 9

            # 1️⃣2️⃣ Upload native builds
            - name: Upload native builds
              uses: actions/upload-artifact@v4
              with:
                  name: native_build
                  path: |
                      native/out/arm64-v8a
                      native/out/armeabi-v7a
                      native/out/x86
                      native/out/x86_64
                  compression-level: 9